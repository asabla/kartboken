services:
  kartboken:
    build:
      context: .
      args:
        PUBLIC_MAP_STYLE_URL: ${PUBLIC_MAP_STYLE_URL:-https://tiles.openfreemap.org/styles/positron}
    ports:
      - "${KARTBOKEN_PORT:-8080}:8080"
    read_only: true
    tmpfs:
      - /tmp:size=16m
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped

